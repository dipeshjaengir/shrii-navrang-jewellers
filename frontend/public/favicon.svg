<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <circle cx="50" cy="50" r="46" stroke="url(#goldGradient)" stroke-width="4" fill="#111111" />
  <circle cx="50" cy="50" r="40" stroke="url(#goldGradient)" stroke-width="1.5" stroke-dasharray="4 4" />
  <!-- stylized diamond shape top -->
  <path d="M50 20 L60 32 L50 44 L40 32 Z" fill="url(#goldGradient)" />
  <!-- stylized diamond shape bottom -->
  <path d="M50 56 L60 68 L50 80 L40 68 Z" fill="url(#goldGradient)" opacity="0.85" />
  <!-- Central gold 'N' monogram -->
  <text x="50" y="58" font-family="'Cinzel', 'Georgia', serif" font-size="25" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">N</text>
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#B18A2B" />
    </linearGradient>
  </defs>
